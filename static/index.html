<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGT60TR13C Radar Dashboard</title>

  <style>
    /* ------------------------------------------------------------------ */
    /* Base                                                                */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08080f;
      --surface:  #10101c;
      --border:   #1c1c2e;
      --text:     #c8cedd;
      --muted:    #484d60;
      --font:     'Courier New', Courier, monospace;

      /* LED colours */
      --led-idle:      #4a3200;   /* amber dark */
      --led-idle-glow: #c87800;
      --led-detected:  #2a2a2a;   /* dim white */
      --led-det-glow:  #888888;
      --led-connected: #ffffff;
      --led-con-glow:  #ffffff;
      --led-error:     #8b0000;
      --led-err-glow:  #ff3040;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                              */
    /* ------------------------------------------------------------------ */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #fff;
    }

    header .sub {
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
    }

    /* ------------------------------------------------------------------ */
    /* Main area                                                           */
    /* ------------------------------------------------------------------ */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ------------------------------------------------------------------ */
    /* Device card                                                         */
    /* ------------------------------------------------------------------ */
    .device-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      min-width: 360px;
      max-width: 480px;
      width: 100%;
    }

    /* ------------------------------------------------------------------ */
    /* LED indicator                                                       */
    /* ------------------------------------------------------------------ */
    .led-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .led {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* State: idle — no device detected, slow amber pulse */
    .led.idle {
      background: var(--led-idle-glow);
      box-shadow: 0 0 6px var(--led-idle-glow);
      animation: pulse-amber 2.5s ease-in-out infinite;
    }

    /* State: detected — device found, not yet connected, slow white pulse */
    .led.detected {
      background: #aaa;
      box-shadow: 0 0 8px #aaa;
      animation: pulse-white 1.8s ease-in-out infinite;
    }

    /* State: connected — solid white, static glow */
    .led.connected {
      background: var(--led-connected);
      box-shadow:
        0 0 8px  var(--led-con-glow),
        0 0 22px rgba(255, 255, 255, 0.35),
        0 0 44px rgba(255, 255, 255, 0.12);
      animation: none;
    }

    /* State: error — fast red blink */
    .led.error {
      background: var(--led-err-glow);
      box-shadow: 0 0 10px var(--led-err-glow);
      animation: blink-red 0.45s step-start infinite;
    }

    /* ------------------------------------------------------------------ */
    /* LED keyframes                                                       */
    /* ------------------------------------------------------------------ */
    @keyframes pulse-amber {
      0%, 100% {
        background: var(--led-idle);
        box-shadow: 0 0 3px var(--led-idle-glow);
        opacity: 0.5;
      }
      50% {
        background: var(--led-idle-glow);
        box-shadow: 0 0 14px var(--led-idle-glow), 0 0 28px rgba(200, 120, 0, 0.3);
        opacity: 1;
      }
    }

    @keyframes pulse-white {
      0%, 100% {
        background: #444;
        box-shadow: 0 0 4px #666;
        opacity: 0.5;
      }
      50% {
        background: #ccc;
        box-shadow: 0 0 16px #ccc, 0 0 32px rgba(255, 255, 255, 0.2);
        opacity: 1;
      }
    }

    @keyframes blink-red {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0.08; }
    }

    /* ------------------------------------------------------------------ */
    /* LED status label                                                    */
    /* ------------------------------------------------------------------ */
    .led-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .led-label.idle      { color: #8a6000; }
    .led-label.detected  { color: #888; }
    .led-label.connected { color: #ccc; }
    .led-label.error     { color: #ff3040; }

    /* ------------------------------------------------------------------ */
    /* Device info                                                         */
    /* ------------------------------------------------------------------ */
    .device-info {
      text-align: center;
      line-height: 1.6;
    }

    .device-name {
      font-size: 15px;
      color: #fff;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .device-desc {
      font-size: 11px;
      color: var(--muted);
    }

    /* ------------------------------------------------------------------ */
    /* Connect button                                                      */
    /* ------------------------------------------------------------------ */
    .btn {
      padding: 10px 32px;
      border-radius: 6px;
      border: none;
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-transform: uppercase;
    }

    .btn:active   { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

    .btn-connect    { background: #fff;     color: #000; }
    .btn-disconnect { background: #1e1e2e; color: #ff3040; border: 1px solid #ff3040; }
    .btn-retry      { background: #1e1e2e; color: #c87800; border: 1px solid #c87800; }

    /* ------------------------------------------------------------------ */
    /* Log                                                                 */
    /* ------------------------------------------------------------------ */
    .log-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #080810;
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-panel span {
      color: #3a3a5c;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <header>
    <h1>BGT60TR13C &nbsp;/&nbsp; RADAR DASHBOARD</h1>
    <span class="sub">Infineon XENSIV™ 60 GHz FMCW</span>
  </header>

  <main>
    <div class="device-card">

      <!-- LED + state label -->
      <div class="led-wrap">
        <div class="led idle" id="led"></div>
        <div class="led-label idle" id="led-label">Scanning…</div>
      </div>

      <!-- Device name + description -->
      <div class="device-info">
        <div class="device-name" id="device-name">BGT60TR13C</div>
        <div class="device-desc" id="device-desc">Looking for device…</div>
      </div>

      <!-- Action button -->
      <button class="btn btn-connect" id="action-btn" disabled>Connect</button>

    </div>
  </main>

  <!-- Status log bar -->
  <div class="log-panel">
    <span>&gt;</span>
    <span id="log-msg">Initialising…</span>
  </div>

  <script type="module" src="/js/app.js"></script>

</body>
</html>
